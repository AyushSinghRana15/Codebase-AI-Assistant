name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push backend to HF Space via git
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret not set — skipping sync"
            exit 0
          fi
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          # Create an orphan branch with only the backend + Dockerfile
          TMP_DIR=$(mktemp -d)
          cp -r backend "$TMP_DIR/backend"
          cp spaces/backend/Dockerfile "$TMP_DIR/Dockerfile"
          [ -f spaces/backend/.gitignore ] && cp spaces/backend/.gitignore "$TMP_DIR/.gitignore"
          cd "$TMP_DIR"
          git init
          git add -A
          git commit -m "Sync from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force https://AyushSingh15:$HF_TOKEN@huggingface.co/spaces/AyushSingh15/CodeBase main
